<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>身体反応ログ可視化</title>
    <style>
      :root {
        --bg: #f6f7f3;
        --ink: #17211d;
        --muted: #65716b;
        --line: #d7ded8;
        --panel: #ffffff;
        --teal: #176c64;
        --rust: #b85c1f;
        --blue: #3d5f91;
        --plum: #865a87;
        --green: #23824e;
        --warning: #b85c1f;
        --shadow: 0 18px 40px rgba(31, 44, 38, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 24px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      button,
      input {
        font: inherit;
      }

      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 16px;
        margin-bottom: 14px;
      }

      .upload-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
      }

      .file-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 10px;
        background: #fbfcfa;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .card {
        padding: 14px;
      }

      .card span,
      th {
        color: var(--muted);
        font-size: 13px;
      }

      .card strong {
        display: block;
        margin-top: 6px;
        font-size: 28px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--teal);
      }

      .chart-wrap {
        height: 380px;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        white-space: nowrap;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .empty {
        padding: 34px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 880px) {
        header,
        .upload-panel {
          display: block;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>身体反応ログ可視化</h1>
          <p>測定ページから出力したCSVまたはJSONを読み込み、時系列とサマリーを確認します。</p>
        </div>
        <p id="sessionMeta"></p>
      </header>

      <section class="panel upload-panel">
        <div>
          <input id="fileInput" class="file-input" type="file" accept=".csv,.json,text/csv,application/json" />
          <p id="loadStatus" class="status">CSVまたはJSONを選択してください。映像ファイルは不要です。</p>
        </div>
        <button id="loadSampleButton" type="button">サンプル表示</button>
      </section>

      <section class="grid" aria-label="サマリー">
        <div class="card">
          <span>行数</span>
          <strong id="rowCount">--</strong>
        </div>
        <div class="card">
          <span>最大体動量</span>
          <strong id="maxMotion">--</strong>
        </div>
        <div class="card">
          <span>最大表情変化</span>
          <strong id="maxFaceMove">--</strong>
        </div>
        <div class="card">
          <span>平均品質</span>
          <strong id="avgQuality">--</strong>
        </div>
        <div class="card">
          <span>マーカー数</span>
          <strong id="markerCount">--</strong>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>時系列チャート</h2>
          <div class="legend">
            <span><i class="dot" style="background: var(--teal)"></i>体動量</span>
            <span><i class="dot" style="background: var(--rust)"></i>姿勢変化</span>
            <span><i class="dot" style="background: var(--plum)"></i>表情変化</span>
            <span><i class="dot" style="background: var(--blue)"></i>品質</span>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart" width="1120" height="380"></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>ログ抜粋</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時刻(ms)</th>
                <th>被験者</th>
                <th>刺激</th>
                <th>マーカー</th>
                <th>体動量</th>
                <th>姿勢変化</th>
                <th>顔向き</th>
                <th>まばたき/min</th>
                <th>表情変化</th>
                <th>静止度</th>
                <th>品質</th>
              </tr>
            </thead>
            <tbody id="logRows">
              <tr>
                <td class="empty" colspan="11">まだデータが読み込まれていません。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const sampleRows = [
        { timestamp_ms: 0, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 12, standard_posture_change: 18, standard_head_pose_label: "正面", standard_blink_rate_per_min: 0, exploratory_facial_movement_intensity: 8, exploratory_stillness: 88, quality_score: 91 },
        { timestamp_ms: 250, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 14, standard_posture_change: 19, standard_head_pose_label: "正面", standard_blink_rate_per_min: 0, exploratory_facial_movement_intensity: 9, exploratory_stillness: 86, quality_score: 92 },
        { timestamp_ms: 500, participant_id: "P001", stimulus_name: "広告A", marker: "marker_1", standard_motion_intensity: 28, standard_posture_change: 24, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 22, exploratory_stillness: 72, quality_score: 90 },
        { timestamp_ms: 750, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 41, standard_posture_change: 36, standard_head_pose_label: "右向き", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 31, exploratory_stillness: 59, quality_score: 88 },
        { timestamp_ms: 1000, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 33, standard_posture_change: 31, standard_head_pose_label: "右向き", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 28, exploratory_stillness: 67, quality_score: 89 },
        { timestamp_ms: 1250, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 19, standard_posture_change: 23, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 14, exploratory_stillness: 81, quality_score: 91 },
        { timestamp_ms: 1500, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 7, standard_posture_change: 17, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 6, exploratory_stillness: 93, quality_score: 92 },
        { timestamp_ms: 1750, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 4, standard_posture_change: 15, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 5, exploratory_stillness: 96, quality_score: 92 },
      ];

      const state = { rows: [] };
      const series = [
        { key: "standard_motion_intensity", color: "#176c64" },
        { key: "standard_posture_change", color: "#b85c1f" },
        { key: "exploratory_facial_movement_intensity", color: "#865a87" },
        { key: "quality_score", color: "#3d5f91" },
      ];

      document.getElementById("fileInput").addEventListener("change", loadFile);
      document.getElementById("loadSampleButton").addEventListener("click", () => render(sampleRows, "サンプルデータ"));
      window.addEventListener("resize", () => drawChart(state.rows));
      drawChart([]);

      async function loadFile(event) {
        const file = event.target.files?.[0];
        if (!file) return;
        const text = await file.text();
        const rows = file.name.toLowerCase().endsWith(".json") ? JSON.parse(text) : parseCsv(text);
        render(rows, file.name);
      }

      function render(rows, sourceName) {
        state.rows = rows.map(normalizeRow);
        document.getElementById("loadStatus").textContent = `${sourceName}: ${state.rows.length}行を読み込みました。`;
        updateSummary(state.rows);
        renderTable(state.rows);
        drawChart(state.rows);
      }

      function normalizeRow(row) {
        const numericKeys = [
          "timestamp_ms",
          "standard_motion_intensity",
          "standard_posture_change",
          "standard_blink_rate_per_min",
          "exploratory_facial_movement_intensity",
          "exploratory_stillness",
          "quality_score",
        ];
        const normalized = { ...row };
        for (const key of numericKeys) {
          normalized[key] = Number(normalized[key] || 0);
        }
        return normalized;
      }

      function updateSummary(rows) {
        const first = rows[0] || {};
        document.getElementById("sessionMeta").textContent = rows.length ? `${first.participant_id || "-"} / ${first.stimulus_name || "-"}` : "";
        document.getElementById("rowCount").textContent = rows.length || "--";
        document.getElementById("maxMotion").textContent = rows.length ? max(rows, "standard_motion_intensity") : "--";
        document.getElementById("maxFaceMove").textContent = rows.length ? max(rows, "exploratory_facial_movement_intensity") : "--";
        document.getElementById("avgQuality").textContent = rows.length ? average(rows, "quality_score") : "--";
        document.getElementById("markerCount").textContent = rows.length ? rows.filter((row) => row.marker).length : "--";
      }

      function renderTable(rows) {
        const body = document.getElementById("logRows");
        if (!rows.length) {
          body.innerHTML = '<tr><td class="empty" colspan="11">まだデータが読み込まれていません。</td></tr>';
          return;
        }
        body.innerHTML = rows
          .slice(0, 120)
          .map(
            (row) => `
              <tr>
                <td>${row.timestamp_ms}</td>
                <td>${escapeHtml(row.participant_id || "")}</td>
                <td>${escapeHtml(row.stimulus_name || "")}</td>
                <td>${escapeHtml(row.marker || "")}</td>
                <td>${row.standard_motion_intensity}</td>
                <td>${row.standard_posture_change}</td>
                <td>${escapeHtml(row.standard_head_pose_label || "")}</td>
                <td>${row.standard_blink_rate_per_min}</td>
                <td>${row.exploratory_facial_movement_intensity}</td>
                <td>${row.exploratory_stillness}</td>
                <td>${row.quality_score}</td>
              </tr>
            `,
          )
          .join("");
      }

      function drawChart(rows) {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        const w = canvas.width;
        const h = canvas.height;
        const pad = { left: 48 * dpr, right: 20 * dpr, top: 18 * dpr, bottom: 38 * dpr };
        const chartW = w - pad.left - pad.right;
        const chartH = h - pad.top - pad.bottom;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#d7ded8";
        ctx.lineWidth = dpr;
        ctx.fillStyle = "#65716b";
        ctx.font = `${12 * dpr}px sans-serif`;

        for (let i = 0; i <= 4; i += 1) {
          const y = pad.top + chartH * (i / 4);
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(w - pad.right, y);
          ctx.stroke();
          ctx.fillText(String(100 - i * 25), 8 * dpr, y + 4 * dpr);
        }

        if (rows.length < 2) {
          ctx.fillStyle = "#65716b";
          ctx.textAlign = "center";
          ctx.fillText("CSVまたはJSONを読み込むとグラフが表示されます", w / 2, h / 2);
          ctx.textAlign = "left";
          return;
        }

        const minT = rows[0].timestamp_ms;
        const maxT = rows[rows.length - 1].timestamp_ms || 1;

        for (const row of rows.filter((item) => item.marker)) {
          const x = pad.left + ((row.timestamp_ms - minT) / Math.max(1, maxT - minT)) * chartW;
          ctx.strokeStyle = "#17211d";
          ctx.setLineDash([5 * dpr, 5 * dpr]);
          ctx.beginPath();
          ctx.moveTo(x, pad.top);
          ctx.lineTo(x, pad.top + chartH);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#17211d";
          ctx.fillText(row.marker, x + 6 * dpr, pad.top + 16 * dpr);
        }

        for (const item of series) {
          ctx.strokeStyle = item.color;
          ctx.lineWidth = 3 * dpr;
          ctx.beginPath();
          rows.forEach((row, index) => {
            const x = pad.left + ((row.timestamp_ms - minT) / Math.max(1, maxT - minT)) * chartW;
            const y = pad.top + chartH - (Number(row[item.key] || 0) / 100) * chartH;
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.stroke();
        }
      }

      function parseCsv(text) {
        const cleanText = text.replace(/^\uFEFF/, "");
        const rows = [];
        let current = "";
        let row = [];
        let insideQuote = false;

        for (let i = 0; i < cleanText.length; i += 1) {
          const char = cleanText[i];
          const next = cleanText[i + 1];
          if (char === '"' && insideQuote && next === '"') {
            current += '"';
            i += 1;
          } else if (char === '"') {
            insideQuote = !insideQuote;
          } else if (char === "," && !insideQuote) {
            row.push(current);
            current = "";
          } else if ((char === "\n" || char === "\r") && !insideQuote) {
            if (char === "\r" && next === "\n") i += 1;
            row.push(current);
            if (row.some((cell) => cell !== "")) rows.push(row);
            row = [];
            current = "";
          } else {
            current += char;
          }
        }
        row.push(current);
        if (row.some((cell) => cell !== "")) rows.push(row);

        const headers = rows.shift() || [];
        return rows.map((cells) => Object.fromEntries(headers.map((header, index) => [header, cells[index] ?? ""])));
      }

      function max(rows, key) {
        return Math.max(...rows.map((row) => Number(row[key] || 0)));
      }

      function average(rows, key) {
        return Math.round(rows.reduce((sum, row) => sum + Number(row[key] || 0), 0) / rows.length);
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }
    </script>
  </body>
</html>
