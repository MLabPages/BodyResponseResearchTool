<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ダミー出力の可視化</title>
    <style>
      :root {
        --bg: #f6f7f3;
        --ink: #17211d;
        --muted: #65716b;
        --line: #d7ded8;
        --panel: #ffffff;
        --teal: #176c64;
        --rust: #b85c1f;
        --blue: #3d5f91;
        --plum: #865a87;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 24px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .card {
        padding: 14px;
      }

      .card span,
      th {
        color: var(--muted);
        font-size: 13px;
      }

      .card strong {
        display: block;
        margin-top: 6px;
        font-size: 28px;
      }

      .panel {
        padding: 16px;
        margin-bottom: 14px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--teal);
      }

      .chart-wrap {
        height: 360px;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        white-space: nowrap;
      }

      .table-wrap {
        overflow-x: auto;
      }

      @media (max-width: 780px) {
        header {
          display: block;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ダミー出力の可視化</h1>
          <p>広告Aを見た架空セッションの出力例です。映像ではなく、推定指標だけを時系列で表示しています。</p>
        </div>
        <p id="sessionMeta"></p>
      </header>

      <section class="grid" aria-label="サマリー">
        <div class="card">
          <span>最大体動量</span>
          <strong id="maxMotion">--</strong>
        </div>
        <div class="card">
          <span>最大表情変化</span>
          <strong id="maxFaceMove">--</strong>
        </div>
        <div class="card">
          <span>平均品質</span>
          <strong id="avgQuality">--</strong>
        </div>
        <div class="card">
          <span>マーカー数</span>
          <strong id="markerCount">--</strong>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>時系列チャート</h2>
          <div class="legend">
            <span><i class="dot" style="background: var(--teal)"></i>体動量</span>
            <span><i class="dot" style="background: var(--rust)"></i>姿勢変化</span>
            <span><i class="dot" style="background: var(--plum)"></i>表情変化</span>
            <span><i class="dot" style="background: var(--blue)"></i>品質</span>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart" width="1120" height="360"></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>ログ抜粋</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時刻(ms)</th>
                <th>マーカー</th>
                <th>体動量</th>
                <th>姿勢変化</th>
                <th>顔向き</th>
                <th>まばたき/min</th>
                <th>表情変化</th>
                <th>静止度</th>
                <th>品質</th>
              </tr>
            </thead>
            <tbody id="logRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const rows = [
        { timestamp_ms: 0, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 12, standard_posture_change: 18, standard_head_pose_label: "正面", standard_blink_rate_per_min: 0, exploratory_facial_movement_intensity: 8, exploratory_stillness: 88, quality_score: 91 },
        { timestamp_ms: 250, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 14, standard_posture_change: 19, standard_head_pose_label: "正面", standard_blink_rate_per_min: 0, exploratory_facial_movement_intensity: 9, exploratory_stillness: 86, quality_score: 92 },
        { timestamp_ms: 500, participant_id: "P001", stimulus_name: "広告A", marker: "marker_1", standard_motion_intensity: 28, standard_posture_change: 24, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 22, exploratory_stillness: 72, quality_score: 90 },
        { timestamp_ms: 750, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 41, standard_posture_change: 36, standard_head_pose_label: "右向き", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 31, exploratory_stillness: 59, quality_score: 88 },
        { timestamp_ms: 1000, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 33, standard_posture_change: 31, standard_head_pose_label: "右向き", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 28, exploratory_stillness: 67, quality_score: 89 },
        { timestamp_ms: 1250, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 19, standard_posture_change: 23, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 14, exploratory_stillness: 81, quality_score: 91 },
        { timestamp_ms: 1500, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 7, standard_posture_change: 17, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 6, exploratory_stillness: 93, quality_score: 92 },
        { timestamp_ms: 1750, participant_id: "P001", stimulus_name: "広告A", marker: "", standard_motion_intensity: 4, standard_posture_change: 15, standard_head_pose_label: "正面", standard_blink_rate_per_min: 20, exploratory_facial_movement_intensity: 5, exploratory_stillness: 96, quality_score: 92 },
      ];

      const series = [
        { key: "standard_motion_intensity", color: "#176c64" },
        { key: "standard_posture_change", color: "#b85c1f" },
        { key: "exploratory_facial_movement_intensity", color: "#865a87" },
        { key: "quality_score", color: "#3d5f91" },
      ];

      function max(key) {
        return Math.max(...rows.map((row) => row[key]));
      }

      function average(key) {
        return Math.round(rows.reduce((sum, row) => sum + row[key], 0) / rows.length);
      }

      document.getElementById("sessionMeta").textContent = `${rows[0].participant_id} / ${rows[0].stimulus_name}`;
      document.getElementById("maxMotion").textContent = max("standard_motion_intensity");
      document.getElementById("maxFaceMove").textContent = max("exploratory_facial_movement_intensity");
      document.getElementById("avgQuality").textContent = average("quality_score");
      document.getElementById("markerCount").textContent = rows.filter((row) => row.marker).length;

      document.getElementById("logRows").innerHTML = rows
        .map(
          (row) => `
            <tr>
              <td>${row.timestamp_ms}</td>
              <td>${row.marker || ""}</td>
              <td>${row.standard_motion_intensity}</td>
              <td>${row.standard_posture_change}</td>
              <td>${row.standard_head_pose_label}</td>
              <td>${row.standard_blink_rate_per_min}</td>
              <td>${row.exploratory_facial_movement_intensity}</td>
              <td>${row.exploratory_stillness}</td>
              <td>${row.quality_score}</td>
            </tr>
          `,
        )
        .join("");

      function drawChart() {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        const w = canvas.width;
        const h = canvas.height;
        const pad = { left: 48 * dpr, right: 20 * dpr, top: 18 * dpr, bottom: 38 * dpr };
        const chartW = w - pad.left - pad.right;
        const chartH = h - pad.top - pad.bottom;
        const minT = rows[0].timestamp_ms;
        const maxT = rows[rows.length - 1].timestamp_ms;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#d7ded8";
        ctx.lineWidth = dpr;
        ctx.fillStyle = "#65716b";
        ctx.font = `${12 * dpr}px sans-serif`;

        for (let i = 0; i <= 4; i += 1) {
          const y = pad.top + chartH * (i / 4);
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(w - pad.right, y);
          ctx.stroke();
          ctx.fillText(String(100 - i * 25), 8 * dpr, y + 4 * dpr);
        }

        for (const row of rows.filter((item) => item.marker)) {
          const x = pad.left + ((row.timestamp_ms - minT) / (maxT - minT)) * chartW;
          ctx.strokeStyle = "#17211d";
          ctx.setLineDash([5 * dpr, 5 * dpr]);
          ctx.beginPath();
          ctx.moveTo(x, pad.top);
          ctx.lineTo(x, pad.top + chartH);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#17211d";
          ctx.fillText(row.marker, x + 6 * dpr, pad.top + 16 * dpr);
        }

        for (const item of series) {
          ctx.strokeStyle = item.color;
          ctx.lineWidth = 3 * dpr;
          ctx.beginPath();
          rows.forEach((row, index) => {
            const x = pad.left + ((row.timestamp_ms - minT) / (maxT - minT)) * chartW;
            const y = pad.top + chartH - (row[item.key] / 100) * chartH;
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.stroke();
        }
      }

      drawChart();
      window.addEventListener("resize", drawChart);
    </script>
  </body>
</html>
